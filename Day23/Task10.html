<!DOCTYPE html>
<html>
<head>
    <title>Live Username Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 250px;
            font-size: 16px;
        }

        #preview {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Live Username Preview</h2>

<input type="text" id="username" placeholder="Enter your username">

<p id="preview">Username: </p>

<script>
    let input = document.getElementById("username");
    let preview = document.getElementById("preview");

    input.addEventListener("input", function () {
        preview.textContent = "Username: " + input.value;
    });
</script>

</body>
</html>
