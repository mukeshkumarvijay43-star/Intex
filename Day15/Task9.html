<!DOCTYPE html>
<html>
<head>
    <title>Simple Profile Using Variables</title>
</head>
<body>

    <script>
        let name = "Mukesh Kumar";
        let age = 20;
        let course = "BCA";
        const country = "India";

        console.log("Name:", name);
        console.log("Age:", age);
        console.log("Course:", course);
        console.log("Country:", country);
    </script>

</body>
</html>
