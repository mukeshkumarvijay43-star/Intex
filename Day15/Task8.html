<!DOCTYPE html>
<html>
<head>
    <title>var, let, const Example</title>
</head>
<body>
    <script>
        // var
        var name = "Mukesh";
        name = "Kumar";   // Can be changed
        console.log("var:", name);

        // let
        let age = 20;
        age = 21;         // Can be changed
        console.log("let:", age);

        // const
        const country = "India";
        console.log("const:", country);

        // country = "USA"; // ❌ Error: Assignment to constant variable
    </script>

</body>
</html>
