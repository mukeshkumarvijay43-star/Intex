<!DOCTYPE html>
<html>
<head>
    <title>Subtract Two Numbers</title>
</head>
<body>

<script>
    function subtractNumbers(num1, num2) {
        return num1 - num2;
    }

    let result = subtractNumbers(20, 10);

    console.log("Difference = " + result);
</script>

</body>
</html>
