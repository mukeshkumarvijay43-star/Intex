<!DOCTYPE html>
<html>
<head>
    <title>Calculator Functions</title>
</head>
<body>

<script>
    function add(a, b) {
        return a + b;
    }

    function subtract(a, b) {
        return a - b;
    }

    function multiply(a, b) {
        return a * b;
    }

    function divide(a, b) {
        return a / b;
    }

    console.log("Addition: " + add(25, 5));
    console.log("Subtraction: " + subtract(50, 5));
    console.log("Multiplication: " + multiply(8, 5));
    console.log("Division: " + divide(100, 5));
</script>

</body>
</html>
