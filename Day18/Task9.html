<!DOCTYPE html>
<html>
<head>
    <title>Voting Eligibility Function</title>
</head>
<body>

<script>
    function checkVotingEligibility(age) {
        if (age >= 18) {
            console.log("Eligible for voting");
        } else {
            console.log("Not eligible for voting");
        }
    }

    checkVotingEligibility(20);
</script>

</body>
</html>
