<!DOCTYPE html>
<html>
<head>
    <title>Login System Using Function</title>
</head>
<body>

<script>
    function login(username, password) {
        if (username === "admin" && password === "1234") {
            return "Login Successful";
        } else {
            return "Login Failed";
        }
    }

    let result = login("admin", "1234");
    console.log(result);
</script>

</body>
</html>
