<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
</head>
<body>

<script>
    function calculator(num1, num2, operator) {
        if (operator === "+") {
            return num1 + num2;
        } else if (operator === "-") {
            return num1 - num2;
        } else if (operator === "*") {
            return num1 * num2;
        } else if (operator === "/") {
            return num1 / num2;
        } else {
            return "Invalid Operator";
        }
    }

    console.log(calculator(10, 5, "+"));
    console.log(calculator(10, 5, "-"));
    console.log(calculator(10, 5, "*"));
    console.log(calculator(10, 5, "/"));
</script>

</body>
</html>
