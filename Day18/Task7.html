<!DOCTYPE html>
<html>
<head>
    <title>Arrow Function - Multiplication</title>
</head>
<body>

<script>
    const multiply = (num1, num2) => {
        return num1 * num2;
    };

    let result = multiply(10, 5);

    console.log("Multiplication = " + result);
</script>

</body>
</html>
