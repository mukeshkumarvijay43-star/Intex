<!DOCTYPE html>
<html>
<head>
    <title>Phone Number Validation</title>
</head>
<body>

<h2>Phone Number Validation</h2>

<input type="text" id="phone" placeholder="Enter phone number (e.g. +919876543210)">
<button id="checkBtn">Validate</button>

<p id="message"></p>

<script>
document.getElementById("checkBtn").addEventListener("click", function () {

    let phone = document.getElementById("phone").value.trim();
    let message = document.getElementById("message");

    // Country code followed by 10-15 digits
    let phonePattern = /^\+\d{1,3}\d{10,15}$/;

    if (phone === "") {
        message.textContent = "Phone number cannot be empty!";
        message.style.color = "red";
    } else if (!phonePattern.test(phone)) {
        message.textContent = "Please enter a valid phone number with country code (e.g. +919876543210).";
        message.style.color = "red";
    } else {
        message.textContent = "Valid phone number.";
        message.style.color = "green";
    }

});
</script>

</body>
</html>
