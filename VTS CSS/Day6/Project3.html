<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .card {
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background-color: #fff;
            text-align: center;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            color: green;
            margin: 10px 0;
        }

        .description {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Wireless Headphones</h2>
        <div class="price">₹2,999</div>
        <p class="description">
            High-quality wireless headphones with crystal-clear sound,
            long battery life, and a comfortable design.
        </p>
    </div>

</body>
</html>
