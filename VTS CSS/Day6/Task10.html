<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .card {
            width: 300px;
            border: 2px solid #333;
            padding: 20px;
            margin: 40px auto;
            background-color: white;
            text-align: center;
            border-radius: 10px;
        }

        .card img {
            width: 120px;
            height: 120px;
            border: 2px solid #555;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .card h2 {
            margin: 10px 0;
        }

        .card p {
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="Mukesh.jpeg" alt="Profile Image">
        <h2>Mukesh Kumar</h2>
        <p>Aspiring Web Developer passionate about HTML, CSS, and creating responsive websites.</p>
    </div>

</body>
</html>
