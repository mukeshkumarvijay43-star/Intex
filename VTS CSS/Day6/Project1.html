<!DOCTYPE html>
<html>
<head>
    <title>Profile Card Design</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .card {
            width: 300px;
            padding: 20px;
            border: 2px solid #333;
            background-color: #fff;
            margin: 50px auto;
            text-align: center;
            border-radius: 10px;
        }

        .card h2 {
            margin: 0;
            color: #333;
        }

        .role {
            color: #007BFF;
            font-weight: bold;
            margin: 10px 0;
        }

        .description {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Mukesh Kumar</h2>
        <p class="role">Web Developer</p>
        <p class="description">
            Passionate about building responsive and user-friendly websites using HTML, CSS, and JavaScript.
        </p>
    </div>

</body>
</html>
