<!DOCTYPE html>
<html>
<head>
    <title>Image Card Layout</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .card{
            width:300px;
            margin:40px auto;
            padding:15px;
            border:2px solid #333;
            border-radius:10px;
            background:#fff;
            text-align:center;
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:8px;
        }

        .title{
            margin-top:15px;
            font-size:22px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="Mukesh.jpeg" alt="Profile Image">
        <div class="title">Beautiful Profile</div>
    </div>

</body>
</html>
