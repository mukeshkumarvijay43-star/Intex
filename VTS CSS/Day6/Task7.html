<!DOCTYPE html>
<html>
<head>
    <title>Three Boxes with Margin</title>
    <style>
        .box {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            border: 2px solid black;
            margin: 20px;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>
<body>

    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>

</body>
</html>
