<!DOCTYPE html>
<html>
<head>
    <title>Card Example</title>
    <style>
        .card {
            width: 300px;
            padding: 20px;
            border: 2px solid #333;
            background-color: #f9f9f9;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Card Title</h2>
        <p>This is a simple card with a fixed width, padding, and border.</p>
    </div>

</body>
</html>
