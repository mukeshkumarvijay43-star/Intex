<!DOCTYPE html>
<html>
<head>
    <title>Simple Website Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        .header,
        .content,
        .footer {
            border: 2px solid #333;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #ffffff;
            text-align: center;
        }

        .header {
            background-color: #87CEEB;
        }

        .content {
            height: 200px;
        }

        .footer {
            background-color: #D3D3D3;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Header</h2>
    </div>

    <div class="content">
        <h3>Content Area</h3>
        <p>This is the main content section of the website.</p>
    </div>

    <div class="footer">
        <h3>Footer</h3>
        <p>&copy; 2026 My Website</p>
    </div>

</body>
</html>
