<!DOCTYPE html>
<html>
<head>
    <title>Padding Example</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            border: 2px solid black;
            padding: 20px;
            background-color: lightblue;
        }
    </style>
</head>
<body>

    <div class="box">
        This text has 20px padding inside the box.
    </div>

</body>
</html>
