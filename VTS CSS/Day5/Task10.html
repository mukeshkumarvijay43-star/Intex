<!DOCTYPE html>
<html>
<head>
    <title>Simple Webpage</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="Task10.css">

    <!-- Internal CSS -->
    <style>
        #title {
            color: darkblue;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .text {
            color: green;
            font-size: 18px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <h1 id="title">Welcome to My Website</h1>

    <p class="text">This is the first paragraph styled using a class selector.</p>

    <p class="text">This is the second paragraph styled using the same class.</p>

    <button style="background-color: blue; color: white; padding: 10px 20px; border: none; border-radius: 5px;">
        Click Me
    </button>

</body>
</html>
