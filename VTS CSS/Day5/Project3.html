<!DOCTYPE html>
<html>
<head>
    <title>Basic Website Home Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #007BFF;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #333;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: #444;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="content">
        <h2>Home Page</h2>
        <p>
            This is a basic website home page created using HTML and CSS.
            The navigation links are styled with CSS, and the page includes
            a header and paragraph content.
        </p>
    </div>

</body>
</html>
