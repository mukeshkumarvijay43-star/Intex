<!DOCTYPE html>
<html>
<head>
    <title>Class Selector Example</title>

    <style>
        .text {
            color: green;
            font-size: 18px;
            font-family: Arial, sans-serif;
        }
    </style>

</head>
<body>

    <p class="text">This is the first paragraph.</p>
    <p class="text">This is the second paragraph.</p>
    <p class="text">This is the third paragraph.</p>

</body>
</html>
