<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #0066cc;
        }

        .bio {
            color: #333;
            font-size: 18px;
            width: 60%;

<body>

    <h1>Mukesh Kumar</h1>

        <p>

            I enjoy creating responsive websites and improving my front-end development skills.
        </p>
    </div>

</body>
</html>
