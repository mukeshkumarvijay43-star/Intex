<!DOCTYPE html>
<html>
<head>
    <title>All 3 CSS Types Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="Task9.css">

    <!-- Internal CSS -->
    <style>
        p {
            color: green;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: blue; text-align: center;">
        Welcome to My Website
    </h1>

    <!-- Internal CSS Applied -->
    <p>This paragraph is styled using Internal CSS.</p>

    <!-- External CSS Applied -->
    <h2 class="heading">This heading is styled using External CSS.</h2>

</body>
</html>
