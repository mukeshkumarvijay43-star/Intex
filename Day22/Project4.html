<!DOCTYPE html>
<html>
<head>
    <title>Product Card Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 220px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>Product Card Generator</h2>

<button onclick="generateCards()">Show Products</button>

<div id="products"></div>

<script>
    function generateCards() {
        const productList = [
            {
                name: "Laptop",
                price: "₹50,000",
                category: "Electronics"
            },
            {
                name: "Smartphone",
                price: "₹25,000",
                category: "Electronics"
            },
            {
                name: "Shoes",
                price: "₹2,500",
                category: "Fashion"
            }
        ];

        let container = document.getElementById("products");
        container.innerHTML = "";

        productList.forEach(product => {
            let card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h3>${product.name}</h3>
                <p><strong>Price:</strong> ${product.price}</p>
                <p><strong>Category:</strong> ${product.category}</p>
            `;

            container.appendChild(card);
        });
    }
</script>

</body>
</html>
