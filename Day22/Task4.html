<!DOCTYPE html>
<html>
<head>
    <title>Update Image Source</title>
</head>
<body>

<img id="myImage" src="Mukesh.jpeg" alt="Image" width="200">

<br><br>

<button onclick="changeImage()">Change Image</button>

<script>
    function changeImage() {
        document.getElementById("myImage").src =
            "Mukesh2.jpeg";
    }
</script>

</body>
</html>
