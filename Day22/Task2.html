<!DOCTYPE html>
<html>
<head>
    <title>Change Paragraph Color</title>
</head>
<body>

<p id="para">This is a paragraph.</p>

<button onclick="changeColor()">Change Color</button>

<script>
    function changeColor() {
        document.getElementById("para").style.color = "green";
    }
</script>

</body>
</html>
