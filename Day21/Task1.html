<!DOCTYPE html>
<html>
<head>
    <title>DOM Example</title>
</head>
<body>

<h1 id="heading">Hello World</h1>

<button onclick="changeText()">Change Text</button>

<script>
    function changeText() {
        document.getElementById("heading").innerHTML = "Welcome to JavaScript DOM!";
    }
</script>

</body>
</html>
