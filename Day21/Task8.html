<!DOCTYPE html>
<html>
<head>
    <title>Insert HTML using innerHTML</title>
</head>
<body>

<div id="content"></div>

<button onclick="insertHTML()">Insert HTML</button>

<script>
    function insertHTML() {
        document.getElementById("content").innerHTML =
            "<h2>Welcome!</h2><p>This content was added using <b>innerHTML</b>.</p>";
    }
</script>

</body>
</html>
