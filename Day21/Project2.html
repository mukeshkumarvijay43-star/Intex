<!DOCTYPE html>
<html>
<head>
    <title>Theme Changer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            transition: 0.5s;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1 id="title">Theme Changer</h1>
<p id="text">Click the button to change the theme.</p>

<button onclick="changeTheme()">Change Theme</button>

<script>
    function changeTheme() {
        document.body.style.backgroundColor = "black";
        document.body.style.color = "white";
    }
</script>

</body>
</html>
