<!DOCTYPE html>
<html>
<head>
    <title>Change Heading Color</title>
</head>
<body>

<h1 id="heading">Welcome to JavaScript</h1>

<button onclick="changeColor()">Change Color</button>

<script>
    function changeColor() {
        document.getElementById("heading").style.color = "blue";
    }
</script>

</body>
</html>
