<!DOCTYPE html>
<html>
<head>
    <title>Change Paragraph Content</title>
</head>
<body>

<p id="para">This is the original paragraph.</p>

<button onclick="changeParagraph()">Change Content</button>

<script>
    function changeParagraph() {
        document.getElementById("para").innerHTML = "This is the new paragraph content!";
    }
</script>

</body>
</html>
