<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-rows: 70px 1fr 60px;
            grid-template-areas:
                "header header"
                "sidebar content"
                "footer footer";
            height: 100vh;
        }

        .header {
            grid-area: header;
            background-color: #1f3a93;
            color: white;
            text-align: center;
            line-height: 70px;
        }

        .sidebar {
            grid-area: sidebar;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
        }

        .sidebar a:hover {
            color: yellow;
        }

        .content {
            grid-area: content;
            background-color: #ecf0f1;
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: white;
            border: 2px solid #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }

        .footer {
            grid-area: footer;
            background-color: #34495e;
            color: white;
            text-align: center;
            line-height: 60px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <h2>Admin Dashboard</h2>
        </div>

        <div class="sidebar">
            <h3>Menu</h3>
            <a href="#">Dashboard</a>
            <a href="#">Users</a>
            <a href="#">Products</a>
            <a href="#">Reports</a>
            <a href="#">Settings</a>
        </div>

        <div class="content">
            <h2>Dashboard Overview</h2>

            <div class="cards">
                <div class="card">Users<br><strong>120</strong></div>
                <div class="card">Orders<br><strong>75</strong></div>
                <div class="card">Revenue<br><strong>₹50,000</strong></div>
            </div>
        </div>

        <div class="footer">
            © 2026 Admin Dashboard
        </div>

    </div>

</body>
</html>
