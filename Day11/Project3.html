<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Layout</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
        }

        /* Grid Layout */
        .container{
            display:grid;
            grid-template-columns:220px 1fr;
            grid-template-rows:80px 1fr;
            grid-template-areas:
                "header header"
                "sidebar content";
            min-height:100vh;
        }

        /* Header */
        .header{
            grid-area:header;
            background:#1f3a93;
            color:white;
            text-align:center;
            padding:20px;
        }

        /* Sidebar */
        .sidebar{
            grid-area:sidebar;
            background:#f0f0f0;
            padding:20px;
        }

        .sidebar h3{
            margin-top:0;
        }

        .sidebar label{
            display:block;
            margin:10px 0;
        }

        /* Content */
        .content{
            grid-area:content;
            background:#fafafa;
            padding:20px;
        }

        /* Product Grid */
        .products{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
        }

        .card{
            background:white;
            border:1px solid #ccc;
            border-radius:8px;
            padding:15px;
            text-align:center;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:5px;
        }

        .price{
            color:green;
            font-weight:bold;
            font-size:18px;
        }

        button{
            background:navy;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>My E-Commerce Store</h2>
    </div>

    <!-- Sidebar Filters -->
    <div class="sidebar">
        <h3>Filters</h3>

        <label><input type="checkbox"> Electronics</label>
        <label><input type="checkbox"> Fashion</label>
        <label><input type="checkbox"> Shoes</label>
        <label><input type="checkbox"> Accessories</label>
    </div>

    <!-- Content -->
    <div class="content">
        <h2>Featured Products</h2>

        <div class="products">

            <div class="card">
                <img src="Headphones.jpg" alt="Product">
                <h3>Headphones</h3>
                <p class="price">₹2,999</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="SmartWatch.jpg" alt="Product">
                <h3>Smart Watch</h3>
                <p class="price">₹4,499</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="Bluetoothspeaker.jpg" alt="Product">
                <h3>Bluetooth Speaker</h3>
                <p class="price">₹1,999</p>
                <button>Buy Now</button>
            </div>

        </div>
    </div>

</div>

</body>
</html>
