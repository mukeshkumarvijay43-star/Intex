<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard UI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Grid Layout */
        .container {
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-rows: 70px 1fr 60px;
            grid-template-areas:
                "sidebar header"
                "sidebar content"
                "sidebar footer";
            height: 100vh;
        }

        /* Header */
        .header {
            grid-area: header;
            background-color: #1f3a93;
            color: white;
            text-align: center;
            line-height: 70px;
        }

        /* Sidebar */
        .sidebar {
            grid-area: sidebar;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-top: 0;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            font-size: 18px;
        }

        .sidebar a:hover {
            color: yellow;
        }

        /* Main Content */
        .content {
            grid-area: content;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: white;
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .card h3 {
            margin: 0;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
            color: #1f3a93;
        }

        /* Footer */
        .footer {
            grid-area: footer;
            background-color: #34495e;
            color: white;
            text-align: center;
            line-height: 60px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin Panel</h2>

        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Products</a>
        <a href="#">Orders</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>

    <!-- Header -->
    <div class="header">
        <h2>Admin Dashboard</h2>
    </div>

    <!-- Main Analytics -->
    <div class="content">
        <h2>Analytics Overview</h2>

        <div class="cards">
            <div class="card">
                <h3>Total Users</h3>
                <p>1,250</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>320</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>₹1,20,000</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Admin Dashboard | All Rights Reserved
    </div>

</div>

</body>
</html>
