<!DOCTYPE html>
<html>
<head>
    <title>Update Object Value</title>
</head>
<body>

<script>
    let student = {
        name: "Mukesh",
        age: 20,
        course: "BCA",
        marks: 85
    };

    // Update object values
    student.age = 21;
    student.marks = 90;

    console.log(student);
</script>

</body>
</html>
