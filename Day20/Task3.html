<!DOCTYPE html>
<html>
<head>
    <title>Bracket Notation Example</title>
</head>
<body>

<script>
    let student = {
        name: "Mukesh",
        age: 20,
        course: "BCA",
        marks: 85
    };

    console.log("Name: " + student["name"]);
    console.log("Age: " + student["age"]);
    console.log("Course: " + student["course"]);
    console.log("Marks: " + student["marks"]);
</script>

</body>
</html>
