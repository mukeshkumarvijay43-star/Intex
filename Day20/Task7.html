<!DOCTYPE html>
<html>
<head>
    <title>Loop Object Using for...in</title>
</head>
<body>

<script>
    let student = {
        name: "Mukesh",
        age: 20,
        course: "BCA",
        marks: 90
    };

    for (let key in student) {
        console.log(key + ": " + student[key]);
    }
</script>

</body>
</html>
