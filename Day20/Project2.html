<!DOCTYPE html>

    <title>Product Details System</title>
</head>
<body>

<script>
    let product = {
        productName: "Laptop",
        price: 50000,
        category: "Electronics",
        stock: 25

    console.log("Stock: " + product.stock);
</script>
