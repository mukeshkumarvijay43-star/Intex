<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:20px;
        }

        .product-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
        }

        .product{
            background:#fff;
            border:1px solid #ddd;
            border-radius:10px;
            padding:15px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        .product img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:8px;
        }

        .product h3{
            margin:10px 0;
        }

        .price{
            color:green;
            font-size:18px;
            font-weight:bold;
            margin-bottom:10px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<h2 align="center">Product Grid</h2>
<br>

<div class="product-grid">

    <div class="product">
        <img src="Bluetoothspeaker.jpg" alt="Product 1">
        <h3>Product 1</h3>
        <p class="price">₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="Wirelessmouse.jpg" alt="Product 2">
        <h3>Wireless Mouse</h3>
        <p class="price">₹1200</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="Headphone.jpg" alt="Product 3">
        <h3>Headphones</h3>
        <p class="price">₹2999</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="Buds.jpg" alt="Product 4">
        <h3>Buds</h3>
        <p class="price">₹1499</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="Smartwatch.jpg" alt="Product 5">
        <h3>Smartwatch</h3>
        <p class="price">₹1,299</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="Sunglasses.jpg" alt="Product 6">
        <h3>Sunglasses</h3>
        <p class="price">₹1,499</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
