<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:30px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        /* Product Grid */
        .product-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
        }

        /* Product Card */
        .card{
            background:#fff;
            border-radius:10px;
            padding:15px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:8px;
        }

        .card h3{
            margin:15px 0 10px;
        }

        .price{
            color:green;
            font-size:18px;
            font-weight:bold;
            margin-bottom:15px;
        }

        button{
            background:#007bff;
            color:#fff;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<h2>Product Grid</h2>

<div class="product-grid">

    <div class="card">
        <img src="Bluetoothspeaker.jpg" alt="Bluetooth Speaker">
        <h3>Bluetooth Speaker</h3>
        <p class="price">₹499</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Buds.jpg" alt="Buds">
        <h3>Buds</h3>
        <p class="price">₹699</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Headphones.jpg" alt="Headphones">
        <h3>Headphones</h3>
        <p class="price">₹899</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Smartwatch.jpg" alt="Smartwatch">
        <h3>Smartwatch</h3>
        <p class="price">₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="sunglasses.jpg" alt="Sunglasses">
        <h3>Sunglasses</h3>
        <p class="price">₹1,299</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Wirelessmouse.jpg" alt="Wireless Mouse">
        <h3>Wireless Mouse</h3>
        <p class="price">₹1,499</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
