<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Header + Grid Body</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        /* Header using Flexbox */
        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#333;
            color:white;
            padding:15px 30px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .menu{
            display:flex;
            gap:20px;
        }

        .menu a{
            color:white;
            text-decoration:none;
        }

        /* Body using Grid */
        .container{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            padding:30px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Flexbox Header -->
    <header class="header">
        <div class="logo">My Dashboard</div>

        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Grid Body -->
    <main class="container">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
        <div class="card">Card 5</div>
        <div class="card">Card 6</div>
    </main>

</body>
</html>
