<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            padding:20px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:15px;
        }

        .gallery img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:8px;
            border:2px solid #ddd;
        }
    </style>
</head>
<body>

<h2>Image Gallery</h2>

<div class="gallery">
    <img src="Bluetoothspeaker.jpg" alt="Image 1">
    <img src="Buds.jpg" alt="Image 2">
    <img src="Headphone.jpg" alt="Image 3">
    <img src="Smartwatch.jpg" alt="Image 4">
    <img src="sunglasses.jpg" alt="Image 5">
    <img src="Wirelessmouse.jpg" alt="Image 6">
</div>

</body>
</html>
