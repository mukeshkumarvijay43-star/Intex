<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Cards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:10px;
    color:#333;
}

.card p{
    font-size:28px;
    font-weight:bold;
    color:#007bff;
}
</style>
</head>

<body>

<h2>Dashboard</h2>

<div class="dashboard">

    <div class="card">
        <h3>Users</h3>
        <p>1,250</p>
    </div>

    <div class="card">
        <h3>Orders</h3>
        <p>320</p>
    </div>

    <div class="card">
        <h3>Revenue</h3>
        <p>₹85,000</p>
    </div>

    <div class="card">
        <h3>Products</h3>
        <p>150</p>
    </div>

</div>

</body>
</html>
