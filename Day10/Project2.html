<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:20px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        /* Responsive Grid */
        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:20px;
        }

        .gallery img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:8px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<h2>Responsive Image Gallery</h2>

<div class="gallery">
    <img src="Bluetoothspeaker.jpg" alt="Bluetooth Speaker">
    <img src="Buds.jpg" alt="Buds">
    <img src="Headphones.jpg" alt="Headphones">
    <img src="Smartwatch.jpg" alt="Smartwatch">
    <img src="sunglasses.jpg" alt="Sunglasses">
    <img src="Wirelessmouse.jpg" alt="Wireless Mouse">
</div>

</body>
</html>
