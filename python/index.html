<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Header Layout</title>
    <style>
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background-color: #111827;
            font-family: Arial, sans-serif;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .search {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .search input {
            width: 60%;
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        .profile {
            width: 38px;
            height: 38px;
            background-color: white;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">Dashboard</div>

    <div class="search">
        <input type="text" placeholder="Search...">
    </div>

    <div class="profile"></div>
</header>

</body>
</html>
