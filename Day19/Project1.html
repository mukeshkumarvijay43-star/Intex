<!DOCTYPE html>
<html>
<head>
    <title>Product List Manager</title>
</head>
<body>

<script>
    let products = ["Laptop", "Mobile", "Keyboard", "Mouse", "Headphones"];

    // Add products
    products.push("Monitor");
    products.push("Printer");

    // Remove one product
    products.pop();

    // Display product list
    console.log("Product List:");
    for (let product of products) {
        console.log(product);
    }
</script>

</body>
</html>
