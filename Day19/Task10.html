<!DOCTYPE html>
<html>
<head>
    <title>Product List System</title>
</head>
<body>

<script>
    let products = ["Laptop", "Mobile", "Keyboard", "Mouse", "Headphones"];

    // Add a new product
    products.push("Monitor");

    // Remove the last product
    products.pop();

    // Print the final product list
    console.log("Final Product List:");
    for (let product of products) {
        console.log(product);
    }
</script>

</body>
</html>
