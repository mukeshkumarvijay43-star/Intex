<!DOCTYPE html>
<html>
<head>
    <title>First and Last Element</title>
</head>
<body>

<script>
    let fruits = ["Apple", "Banana", "Mango", "Orange", "Grapes"];

    console.log("First Element: " + fruits[0]);
    console.log("Last Element: " + fruits[fruits.length - 1]);
</script>

</body>
</html>
