<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Webpage</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* Header */
header{
    background:#333;
    color:#fff;
    text-align:center;
    padding:20px;
}

/* Cards Section */
.cards{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
    padding:20px;
}

.card{
    background:#fff;
    padding:10px;
    text-align:center;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
    width:50%;
    height:auto;
    border-radius:10px;
}

.card h3{
    margin:15px 0 10px;
}

.card p{
    color:#555;
    margin-bottom:15px;
}

.card button{
    background:#007BFF;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.card button:hover{
    background:#0056b3;
}

/* Footer */
footer{
    background:#333;
    color:#fff;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

/* Tablet */
@media (min-width:768px){
    .cards{
        grid-template-columns:repeat(2,1fr);
    }
}

/* Desktop */
@media (min-width:1024px){
    .cards{
        grid-template-columns:repeat(3,1fr);
    }
}
</style>
</head>
<body>

<header>
    <h1>My Responsive Website</h1>
</header>

<section class="cards">
    <div class="card">
        <img src="Mukesh.jpeg" alt="Card 1">
        <h3>Mukesh Kumar</h3>
        <p>Software Engineer</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="Boy.jpg" alt="Card 2">
        <h3>John Doe</h3>
        <p>Web Developer</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="Girl.jpg" alt="Card 3">
        <h3>Priya</h3>
        <p>UI/UX Designer</p>
        <button>Read More</button>
    </div>
</section>

<footer>
    <p>&copy; 2026 My Responsive Website. All Rights Reserved.</p>
</footer>

</body>
</html>
