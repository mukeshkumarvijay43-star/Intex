<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile-First Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* Mobile First (Default) */
.container{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
    padding:15px;
}

.header,
.sidebar,
.content,
.footer{
    background:#4CAF50;
    color:white;
    padding:20px;
    text-align:center;
    border-radius:8px;
}

/* Tablet */
@media (min-width:768px){
    .container{
        grid-template-columns:1fr 2fr;
    }

    .header,
    .footer{
        grid-column:1 / 3;
    }
}

/* Desktop */
@media (min-width:1024px){
    .container{
        grid-template-columns:250px 1fr;
    }

    .header,
    .footer{
        grid-column:1 / 3;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">Header</div>
    <div class="sidebar">Sidebar</div>
    <div class="content">
        <h2>Main Content</h2>
        <p>This layout is designed using the mobile-first approach.</p>
    </div>
    <div class="footer">Footer</div>
</div>

</body>
</html>
