<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Product Cards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    display:grid;
    grid-template-columns:1fr;   /* Mobile: 1 column */
    gap:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    text-align:center;
    padding-bottom:20px;
}

.card img{
    width:100%;
    height:auto;
}

.card h3{
    margin:15px 0 10px;
}

.card p{
    color:#555;
    margin:0 15px 15px;
}

.card button{
    padding:10px 20px;
    background:#007BFF;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.card button:hover{
    background:#0056b3;
}

/* Desktop: 3 columns */
@media (min-width:768px){
    .container{
        grid-template-columns:repeat(3,1fr);
    }
}
</style>
</head>
<body>

<h1 style="text-align:center; margin-bottom:20px;">Our Products</h1>

<div class="container">

    <div class="card">
        <img src="Buds.jpg" alt="Product 1">
        <h3>Wireless Buds</h3>
        <p>High-quality product with modern design.</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Headphones.jpg" alt="Product 2">
        <h3>Wireless Headphones</h3>
        <p>Perfect choice for everyday use.</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Wirelessmouse.jpg" alt="Product 3">
        <h3>Wireless Mouse</h3>
        <p>Reliable and affordable product.</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
