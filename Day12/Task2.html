<!DOCTYPE html>
<html>
<head>
    <title>Responsive Heading</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 48px;
            color: navy;
        }

        p {
            font-size: 20px;
        }

        /* Mobile View */
        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>

    <p>
        Resize the browser window. On mobile screens, the heading becomes smaller.
    </p>

</body>
</html>
