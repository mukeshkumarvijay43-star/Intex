<!DOCTYPE html>
<html>
<head>
    <title>Flex Row to Column</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .box {
            flex: 1;
            background-color: lightblue;
            border: 2px solid black;
            padding: 40px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* Mobile View */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h2>Responsive Flexbox Layout</h2>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>

</body>
</html>
