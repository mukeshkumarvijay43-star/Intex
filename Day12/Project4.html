<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Admin Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* Dashboard Layout */
.dashboard{
    display:grid;
    grid-template-columns:250px 1fr;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    background:#2c3e50;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:15px 0;
}

.sidebar ul li a{
    color:#fff;
    text-decoration:none;
}

/* Main Content */
.main{
    display:flex;
    flex-direction:column;
}

/* Header */
.header{
    background:#34495e;
    color:#fff;
    padding:20px;
}

.content{
    padding:20px;
}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:8px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

/* Mobile View */
@media (max-width:768px){

    .dashboard{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none; /* Collapse sidebar */
    }
}
</style>
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>Dashboard</h2>
        <ul>
            <li><a href="#">🏠 Home</a></li>
            <li><a href="#">📊 Analytics</a></li>
            <li><a href="#">📦 Products</a></li>
            <li><a href="#">👥 Users</a></li>
            <li><a href="#">⚙ Settings</a></li>
        </ul>
    </aside>

    <main class="main">
        <header class="header">
            <h1>Admin Dashboard</h1>
        </header>

        <section class="content">
            <div class="cards">
                <div class="card">
                    <h3>Total Users</h3>
                    <p>1,250</p>
                </div>

                <div class="card">
                    <h3>Orders</h3>
                    <p>320</p>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>$12,500</p>
                </div>

                <div class="card">
                    <h3>Products</h3>
                    <p>86</p>
                </div>
            </div>
        </section>
    </main>

</div>

</body>
</html>
