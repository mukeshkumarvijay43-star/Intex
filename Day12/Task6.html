<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Navbar</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    nav {
        background: #333;
        padding: 15px;
    }

    .navbar {
        display: flex;
        justify-content: center;
        gap: 20px;
        list-style: none;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        padding: 8px 12px;
    }

    .navbar a:hover {
        background: #555;
        border-radius: 5px;
    }

    /* Mobile View */
    @media (max-width: 768px) {
        .navbar {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
</head>
<body>

<nav>
    <ul class="navbar">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

</body>
</html>
