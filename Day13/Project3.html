<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smooth Scroll Effect</title>

<style>
/* Enable Smooth Scrolling */
html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

/* Navbar */
nav{
    position:sticky;
    top:0;
    background:#333;
    padding:15px;
    text-align:center;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
}

/* Sections */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    color:#fff;
}

#home{
    background:#2196F3;
}

#about{
    background:#4CAF50;
}

#services{
    background:#FF9800;
}

#contact{
    background:#9C27B0;
}
</style>
</head>
<body>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
</nav>

<section id="home">
    <h1>Home</h1>
</section>

<section id="about">
    <h1>About</h1>
</section>

<section id="services">
    <h1>Services</h1>
</section>

<section id="contact">
    <h1>Contact</h1>
</section>

</body>
</html>
