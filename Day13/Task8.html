<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Screen Hero Section</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

/* Full Screen Hero */
.hero{
    height:100vh;              /* Full screen height */
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:linear-gradient(135deg, #007BFF, #00C6FF);
    color:white;
    padding:20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    max-width:600px;
    margin-bottom:25px;
}

.hero button{
    padding:12px 24px;
    font-size:16px;
    border:none;
    border-radius:5px;
    background:#fff;
    color:#007BFF;
    cursor:pointer;
    transition:0.3s;
}

.hero button:hover{
    background:#f0f0f0;
    transform:scale(1.05);
}

/* Responsive */
@media (max-width:768px){
    .hero h1{
        font-size:36px;
    }

    .hero p{
        font-size:18px;
    }
}
</style>
</head>
<body>

<section class="hero">
    <h1>Welcome to Mukesh Tech</h1>
    <p>
        Build modern, responsive, and user-friendly websites using HTML, CSS,
        and JavaScript.
    </p>
    <button>Get Started</button>
</section>

</body>
</html>
