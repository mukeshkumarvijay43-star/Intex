<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section Spacing Example</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

/* Increase spacing between sections */
section{
    padding:80px 20px;
    margin-bottom:60px;
}

.hero{
    background:#f4f4f4;
    text-align:center;
}

.services{
    background:#e8f5e9;
    text-align:center;
}

.contact{
    background:#e3f2fd;
    text-align:center;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<section class="hero">
    <h1>Hero Section</h1>
    <p>Welcome to our website.</p>
</section>

<section class="services">
    <h2>Our Services</h2>
    <p>We provide web design, development, and SEO services.</p>
</section>

<section class="contact">
    <h2>Contact Us</h2>
    <p>Email: info@example.com</p>
</section>

<footer>
    <p>&copy; 2026 My Website. All Rights Reserved.</p>
</footer>

</body>
</html>
