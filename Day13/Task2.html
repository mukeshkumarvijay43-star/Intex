<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Section with Image</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    min-height:100vh;
    padding:50px;
    background:#f4f4f4;
    gap:40px;
}

.hero-content{
    flex:1;
}

.hero-content h1{
    font-size:48px;
    margin-bottom:20px;
}

.hero-content p{
    font-size:18px;
    margin-bottom:20px;
}

.hero-content button{
    padding:12px 24px;
    border:none;
    background:#007BFF;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

.hero-image{
    flex:1;
    text-align:center;
}

.hero-image img{
    width:100%;
    max-width:450px;
    height:auto;
    border-radius:10px;
}

/* Responsive */
@media (max-width:768px){
    .hero{
        flex-direction:column;
        text-align:center;
        padding:30px;
    }

    .hero-content h1{
        font-size:36px;
    }
}
</style>
</head>
<body>

<section class="hero">

    <div class="hero-content">
        <h1>Welcome to Mukesh Tech</h1>
        <p>Learn HTML, CSS, JavaScript, and build modern responsive websites.</p>
        <button>Get Started</button>
    </div>

    <div class="hero-image">
        <img src="Mukesh.jpeg" alt="Hero Image">
    </div>

</section>

</body>
</html>
