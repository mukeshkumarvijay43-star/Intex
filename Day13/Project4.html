<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

.gallery{
    padding:50px 20px;
}

.gallery h2{
    text-align:center;
    margin-bottom:30px;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.gallery-grid img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery-grid img:hover{
    transform:scale(1.05);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* Mobile */
@media (max-width:768px){
    .gallery{
        padding:30px 15px;
    }
}
</style>
</head>
<body>

<section class="gallery">
    <h2>Image Gallery</h2>

    <div class="gallery-grid">
        <img src="Bluetoothspeaker.jpg" alt="Gallery Image 1">
        <img src="Buds.jpg" alt="Gallery Image 2">
        <img src="Headphones.jpg" alt="Gallery Image 3">
        <img src="Smartwatch.jpg" alt="Gallery Image 4">
        <img src="sunglasses.jpg" alt="Gallery Image 5">
        <img src="Wirelessmouse.jpg" alt="Gallery Image 6">
    </div>
</section>

</body>
</html>
