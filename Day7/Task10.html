<!DOCTYPE html>
<html>
<head>
    <title>Website Layout</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif;">

<!-- Fixed Header -->
<div style="position:fixed; top:0; left:0; width:100%; height:60px; background:#333; color:white; text-align:center; line-height:60px; font-size:24px;">
    My Website
</div>

<!-- Sidebar (Absolute) -->
<div style="position:absolute; top:60px; left:0; width:200px; height:500px; background:#f0f0f0; padding:15px; box-sizing:border-box;">
    <h3>Menu</h3>
    <p>Home</p>
    <p>About</p>
    <p>Services</p>
    <p>Contact</p>
</div>

<!-- Content (Block Layout) -->
<div style="margin-top:60px; margin-left:220px; padding:20px;">
    <h2>Welcome</h2>
    <p>This is the main content section of the website.</p>
    <p>It uses a normal block layout and is positioned beside the sidebar.</p>
    <p>You can add articles, images, videos, or other website content here.</p>
</div>

<!-- Footer -->
<div style="margin-left:220px; background:#333; color:white; text-align:center; padding:15px; margin-top:20px;">
    © 2026 My Website. All Rights Reserved.
</div>

</body>
</html>
