<!DOCTYPE html>
<html>
<head>
    <title>Absolute Position Inside Parent</title>
</head>
<body>

<div style="position: relative; width: 300px; height: 200px; border: 2px solid black; background-color: lightgray;">

    <div style="position: absolute; top: 20px; right: 20px; width: 100px; height: 60px; background-color: lightblue; text-align: center; line-height: 60px; border: 1px solid black;">
        Absolute Box
    </div>

</div>

</body>
</html>
