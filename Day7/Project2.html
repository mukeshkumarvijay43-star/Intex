<!DOCTYPE html>
<html>
<head>
    <title>Profile Card Layout</title>
</head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;text-align:center;">

<h2>Team Members</h2>

<div style="display:inline-block;width:250px;padding:15px;margin:15px;border:1px solid #ccc;background:#fff;text-align:center;vertical-align:top;">

    <img src="Mukesh.jpeg"
         alt="Profile"
         style="width:120px;height:120px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 15px;">

    <h3>Mukesh Kumar</h3>
    <p><strong>Web Developer</strong></p>
    <p>Passionate about creating responsive and user-friendly websites.</p>

</div>

<div style="display:inline-block;width:250px;padding:15px;margin:15px;border:1px solid #ccc;background:#fff;text-align:center;vertical-align:top;">

    <img src="Boy.jpg"
         alt="Profile"
         style="width:120px;height:120px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 15px;">

    <h3>Emma Johnson</h3>
    <p><strong>UI/UX Designer</strong></p>
    <p>Designs clean, modern, and engaging user interfaces.</p>

</div>

<div style="display:inline-block;width:250px;padding:15px;margin:15px;border:1px solid #ccc;background:#fff;text-align:center;vertical-align:top;">

    <img src="Girl.jpg"
         alt="Profile"
         style="width:120px;height:120px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 15px;">

    <h3>Priya Patel</h3>
    <p><strong>Project Manager</strong></p>
    <p>Coordinates teams and ensures projects are completed on time.</p>

</div>

</body>
</html>
