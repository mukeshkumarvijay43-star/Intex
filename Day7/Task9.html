<!DOCTYPE html>
<html>
<head>
    <title>Display + Position Layout</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif;">

<!-- Header -->
<div style="position:fixed; top:0; left:0; width:100%; background:#333; color:white; padding:15px; text-align:center;">
    My Website
</div>

<!-- Main Content -->
<div style="margin-top:70px; padding:20px;">

    <!-- Inline-block Cards -->
    <div style="display:inline-block; width:220px; height:150px; background:lightblue; border:1px solid #000; margin:10px; padding:10px; vertical-align:top;">
        <h3>HTML</h3>
        <p>Learn the structure of web pages.</p>
    </div>

    <div style="display:inline-block; width:220px; height:150px; background:lightgreen; border:1px solid #000; margin:10px; padding:10px; vertical-align:top; position:relative;">
        <h3>CSS</h3>

        <!-- Absolute Badge -->
        <span style="position:absolute; top:10px; right:10px; background:red; color:white; padding:3px 8px;">
            New
        </span>

        <p>Style and design beautiful websites.</p>
    </div>

    <div style="display:inline-block; width:220px; height:150px; background:lightcoral; border:1px solid #000; margin:10px; padding:10px; vertical-align:top;">
        <h3>JavaScript</h3>
        <p>Add interactivity to your web pages.</p>
    </div>

</div>

</body>
</html>
