<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery Layout</title>
</head>
<body style="font-family:Arial, sans-serif; background:#f4f4f4; text-align:center;">

    <h2>Image Gallery</h2>

    <!-- Image 1 -->
    <div style="display:inline-block; width:220px; margin:15px; padding:10px; border:1px solid #ccc; background:#fff;">
        <img src="Nature.jpg" alt="Image 1"
             style="width:100%; height:150px; object-fit:cover;">
        <h3>Nature</h3>
    </div>

    <!-- Image 2 -->
    <div style="display:inline-block; width:220px; margin:15px; padding:10px; border:1px solid #ccc; background:#fff;">
        <img src="Mountains.jpg" alt="Image 2"
             style="width:100%; height:150px; object-fit:cover;">
        <h3>Mountains</h3>
    </div>

    <!-- Image 3 -->
    <div style="display:inline-block; width:220px; margin:15px; padding:10px; border:1px solid #ccc; background:#fff;">
        <img src="Beach.jpg" alt="Image 3"
             style="width:100%; height:150px; object-fit:cover;">
        <h3>Beach</h3>
    </div>

    <!-- Image 4 -->
    <div style="display:inline-block; width:220px; margin:15px; padding:10px; border:1px solid #ccc; background:#fff;">
        <img src="Forest.jpg" alt="Image 4"
             style="width:100%; height:150px; object-fit:cover;">
        <h3>Forest</h3>
    </div>

</body>
</html>
