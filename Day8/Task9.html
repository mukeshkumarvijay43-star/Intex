<!DOCTYPE html>
<html>
<head>
    <title>Horizontal Menu using Flexbox</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 30px;
            background-color: #333;
            padding: 15px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 8px 12px;
        }

        .menu a:hover {
            background-color: #555;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
</div>

</body>
</html>
