<!DOCTYPE html>
<html>
<head>
    <title>Center Align with Flexbox</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            border: 2px solid black;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: lightgreen;
            border: 2px solid black;
            text-align: center;
            line-height: 100px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">Box</div>
</div>

</body>
</html>
