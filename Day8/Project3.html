<!DOCTYPE html>
<html>
<head>
    <title>Product Card Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            padding: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 220px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            padding: 15px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 150px;
            border-radius: 8px;
        }

        .card h3 {
            margin: 15px 0 10px;
        }

        .card p {
            color: #555;
            margin-bottom: 10px;
        }

        .card button {
            padding: 10px 20px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <img src="Bluetoothspeaker.jpg" alt="Product">
        <h3>Bluetooth Speaker</h3>
        <p>₹5,000</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Buds.jpg" alt="Product">
        <h3>Wireless Buds</h3>
        <p>₹20,000</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Headphones.jpg" alt="Product">
        <h3>Headphones</h3>
        <p>₹2,500</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="Smartwatch.jpg" alt="Product">
        <h3>Smart Watch</h3>
        <p>₹5,000</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
