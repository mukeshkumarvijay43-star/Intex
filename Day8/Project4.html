<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Layout</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        .container{
            display:flex;
            height:100vh;
        }

        .sidebar{
            width:250px;
            background:#2c3e50;
            color:white;
            padding:20px;
        }

        .sidebar h2{
            margin-bottom:20px;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            padding:12px 0;
        }

        .sidebar ul li a{
            color:white;
            text-decoration:none;
        }

        .sidebar ul li a:hover{
            color:yellow;
        }

        .main-content{
            flex:1;
            background:#f4f4f4;
            padding:20px;
        }

        .main-content h1{
            margin-bottom:15px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>Dashboard</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Users</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Reports</a></li>
            <li><a href="#">Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1>Welcome</h1>
        <p>This is the main content area.</p>
    </div>

</div>

</body>
</html>
