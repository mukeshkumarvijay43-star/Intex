<!DOCTYPE html>
<html>
<head>
    <title>Space Between Example</title>
    <style>
        .container {
            display: flex;
            justify-content: space-between;
            border: 2px solid black;
            padding: 20px;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            border: 2px solid black;
            text-align: center;
            line-height: 100px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
