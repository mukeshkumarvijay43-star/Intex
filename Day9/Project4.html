<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Header Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2c3e50;
            padding: 15px 30px;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            flex: 1;
        }

        .search {
            flex: 2;
            display: flex;
            justify-content: center;
        }

        .search input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .profile {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            color: white;
            font-size: 18px;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background-color: white;
            color: #2c3e50;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">My Dashboard</div>

    <div class="search">
        <input type="text" placeholder="Search...">
    </div>

    <div class="profile">
        <span>Profile</span>
        <div class="profile-icon">👤</div>
    </div>
</header>

</body>
</html>
