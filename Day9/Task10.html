<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Header</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            padding: 15px 30px;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .search {
            flex: 1;
            display: flex;
            justify-content: center;
            margin: 0 30px;
        }

        .search input {
            width: 60%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .profile {
            width: 45px;
            height: 45px;
            background-color: white;
            color: #2c3e50;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">My Dashboard</div>

    <div class="search">
        <input type="text" placeholder="Search...">
    </div>

    <div class="profile">👤</div>
</header>

</body>
</html>
