<!DOCTYPE html>
<html>
<head>
    <title>Card Layout - Space Between</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            padding: 30px;
        }

        .container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .card {
            width: 220px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            margin-bottom: 15px;
        }

        .card button {
            padding: 10px 20px;
            border: none;
            background: #007BFF;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .card button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>Card 1</h3>
        <p>Product One</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h3>Card 2</h3>
        <p>Product Two</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h3>Card 3</h3>
        <p>Product Three</p>
        <button>Buy Now</button>
    </div>
</div>

</body>
</html>
