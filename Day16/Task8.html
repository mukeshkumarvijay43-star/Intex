<!DOCTYPE html>
<html>
<head>
    <title>Traffic Signal System</title>
</head>
<body>

<script>
    let signal = "Green";

    if (signal === "Red") {
        console.log("Stop");
    } else if (signal === "Yellow") {
        console.log("Get Ready");
    } else if (signal === "Green") {
        console.log("Go");
    } else {
        console.log("Invalid Signal");
    }
</script>

</body>
</html>
