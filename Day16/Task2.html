<!DOCTYPE html>
<html>
<head>
    <title>Greater Number</title>
</head>
<body>

<script>
    let num1 = 25;
    let num2 = 40;

    if (num1 > num2) {
        console.log(num1 + " is greater");
    } else if (num2 > num1) {
        console.log(num2 + " is greater");
    } else {
        console.log("Both numbers are equal");
    }
</script>

</body>
</html>
