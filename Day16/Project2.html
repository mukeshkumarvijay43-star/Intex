<!DOCTYPE html>
<html>
<head>
    <title>Student Grade System</title>
</head>
<body>

<script>
    let marks = 85;

    if (marks >= 80) {
        console.log("Grade: A");
    } else if (marks >= 60) {
        console.log("Grade: B");
    } else {
        console.log("Grade: C");
    }
</script>

</body>
</html>
