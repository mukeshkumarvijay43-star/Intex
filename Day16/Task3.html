<!DOCTYPE html>
<html>
<head>
    <title>Modulus Operator</title>
</head>
<body>

<script>
    let num1 = 17;
    let num2 = 5;

    let remainder = num1 % num2;

    console.log("First Number:", num1);
    console.log("Second Number:", num2);
    console.log("Remainder:", remainder);
</script>

</body>
</html>
